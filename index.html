<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Akash V | CSE-AIML Engineer & Full-Stack Developer</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    animation: {
                        'fade-in-up': 'fadeInUp 0.8s ease-out forwards',
                        'blob': 'blob 7s infinite',
                        'pulse-slow': 'pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                    },
                    keyframes: {
                        fadeInUp: {
                            '0%': { opacity: 0, transform: 'translateY(30px)' },
                            '100%': { opacity: 1, transform: 'translateY(0)' },
                        },
                        blob: {
                            '0%': { transform: 'translate(0px, 0px) scale(1)' },
                            '33%': { transform: 'translate(30px, -50px) scale(1.1)' },
                            '66%': { transform: 'translate(-20px, 20px) scale(0.9)' },
                            '100%': { transform: 'translate(0px, 0px) scale(1)' },
                        }
                    }
                }
            }
        }
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Fira+Code:wght@400;500&display=swap');
        
        body { font-family: 'Inter', sans-serif; scroll-behavior: smooth; overflow-x: hidden; }
        .cyber-gradient { background: linear-gradient(135deg, #3b82f6 0%, #1e40af 100%); }
        .tech-tag { font-family: 'Fira Code', monospace; font-size: 0.75rem; }
        
        * { transition: background-color 0.3s ease, border-color 0.3s ease; }
        .delay-100 { animation-delay: 100ms; }
        .delay-200 { animation-delay: 200ms; }
        .delay-300 { animation-delay: 300ms; }
        
        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #3b82f6; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #2563eb; }

        .glass-panel {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        html:not(.dark) .glass-panel {
            background: rgba(255, 255, 255, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.4);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.05);
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 dark:bg-[#020617] dark:text-slate-100 transition-colors duration-500 relative">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- Custom Hook: Typing Effect ---
        const useTypingEffect = (words, typingSpeed = 100, deletingSpeed = 50, pauseTime = 2000) => {
            const [text, setText] = useState('');
            const [wordIndex, setWordIndex] = useState(0);
            const [isDeleting, setIsDeleting] = useState(false);

            useEffect(() => {
                const currentWord = words[wordIndex];
                let timeout;

                if (isDeleting) {
                    timeout = setTimeout(() => {
                        setText(currentWord.substring(0, text.length - 1));
                        if (text.length === 0) {
                            setIsDeleting(false);
                            setWordIndex((prev) => (prev + 1) % words.length);
                        }
                    }, deletingSpeed);
                } else {
                    timeout = setTimeout(() => {
                        setText(currentWord.substring(0, text.length + 1));
                        if (text.length === currentWord.length) {
                            setTimeout(() => setIsDeleting(true), pauseTime);
                        }
                    }, typingSpeed);
                }
                return () => clearTimeout(timeout);
            }, [text, isDeleting, wordIndex, words]);

            return text;
        };

        // --- Adaptive Galaxy Canvas Component ---
        const Starfield = ({ isDark }) => {
            const canvasRef = useRef(null);

            useEffect(() => {
                const canvas = canvasRef.current;
                const ctx = canvas.getContext('2d');
                let animationFrameId;
                let stars = [];

                const init = () => {
                    canvas.width = window.innerWidth;
                    canvas.height = window.innerHeight;
                    stars = [];
                    const numStars = window.innerWidth < 768 ? 80 : 200; 
                    
                    for (let i = 0; i < numStars; i++) {
                        stars.push({
                            x: Math.random() * canvas.width,
                            y: Math.random() * canvas.height,
                            radius: Math.random() * 1.8,
                            vx: (Math.random() - 0.5) * 0.3,
                            vy: (Math.random() - 0.5) * 0.3,
                            opacity: Math.random(),
                            twinkleSpeed: (Math.random() * 0.02) + 0.005
                        });
                    }
                };

                const render = () => {
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                    
                    // Determine particle color based on theme
                    const rgb = isDark ? '255, 255, 255' : '59, 130, 246'; // White in dark, Cyber Blue in light
                    
                    stars.forEach(star => {
                        star.opacity += star.twinkleSpeed;
                        if (star.opacity > 1 || star.opacity < 0.1) {
                            star.twinkleSpeed = -star.twinkleSpeed;
                        }

                        star.x += star.vx;
                        star.y += star.vy;

                        if (star.x < 0) star.x = canvas.width;
                        if (star.x > canvas.width) star.x = 0;
                        if (star.y < 0) star.y = canvas.height;
                        if (star.y > canvas.height) star.y = 0;

                        ctx.beginPath();
                        ctx.arc(star.x, star.y, star.radius, 0, Math.PI * 2);
                        
                        // Lower opacity in light mode so it remains subtle
                        const finalOpacity = isDark ? star.opacity : star.opacity * 0.4;
                        ctx.fillStyle = `rgba(${rgb}, ${finalOpacity})`;
                        ctx.fill();
                    });

                    animationFrameId = requestAnimationFrame(render);
                };

                init();
                render();

                const handleResize = () => init();
                window.addEventListener('resize', handleResize);

                return () => {
                    cancelAnimationFrame(animationFrameId);
                    window.removeEventListener('resize', handleResize);
                };
            }, [isDark]); // Re-run effect when theme changes to update colors immediately

            return (
                <canvas 
                    ref={canvasRef} 
                    className="fixed top-0 left-0 w-full h-full z-[-15] pointer-events-none transition-opacity duration-1000"
                />
            );
        };

        const App = () => {
            const [isDark, setIsDark] = useState(true);
            const [scrollProgress, setScrollProgress] = useState(0);
            const [formStatus, setFormStatus] = useState('idle');

            const titles = ["CSE-AIML Engineer", "Full-Stack Developer", "System Optimizer", "MERN Specialist"];
            const typedText = useTypingEffect(titles);

            useEffect(() => {
                if (isDark) document.documentElement.classList.add('dark');
                else document.documentElement.classList.remove('dark');
                setTimeout(() => lucide.createIcons(), 50);
            }, [isDark]);

            useEffect(() => {
                const handleScroll = () => {
                    const totalScroll = document.documentElement.scrollTop;
                    const windowHeight = document.documentElement.scrollHeight - document.documentElement.clientHeight;
                    const scroll = `${totalScroll / windowHeight}`;
                    setScrollProgress(scroll);
                }
                window.addEventListener('scroll', handleScroll);
                return () => window.removeEventListener('scroll', handleScroll);
            }, []);

            const handleFormSubmit = (e) => {
                e.preventDefault();
                setFormStatus('submitting');
                setTimeout(() => setFormStatus('success'), 1500);
            };

            return (
                <div className="min-h-screen relative">
                    {/* Top Scroll Progress Bar */}
                    <div className="fixed top-0 left-0 h-1 bg-blue-600 z-[60] transition-all duration-150" style={{ width: `${scrollProgress * 100}%` }}></div>

                    {/* Adaptive Galaxy Particles */}
                    <Starfield isDark={isDark} />

                    {/* Adaptive Nebula Background Blobs */}
                    <div className="fixed top-0 left-0 w-full h-full overflow-hidden -z-20 pointer-events-none">
                        <div className="absolute top-0 left-1/4 w-96 h-96 bg-blue-300/40 dark:bg-blue-500/20 rounded-full mix-blend-multiply dark:mix-blend-screen filter blur-3xl animate-blob"></div>
                        <div className="absolute top-0 right-1/4 w-96 h-96 bg-purple-300/40 dark:bg-purple-500/20 rounded-full mix-blend-multiply dark:mix-blend-screen filter blur-3xl animate-blob animation-delay-2000"></div>
                        <div className="absolute -bottom-8 left-1/2 w-96 h-96 bg-sky-300/40 dark:bg-indigo-500/20 rounded-full mix-blend-multiply dark:mix-blend-screen filter blur-3xl animate-blob animation-delay-4000"></div>
                    </div>

                    {/* Navbar */}
                    <nav className="fixed top-0 w-full z-50 px-6 py-4 flex justify-between items-center glass-panel border-b border-transparent">
                        <div className="text-xl font-bold tracking-tighter text-blue-600 dark:text-blue-400">AKASH.V</div>
                        <div className="flex items-center space-x-6">
                            <div className="hidden md:flex space-x-8 text-sm font-semibold mr-4">
                                <a href="#about" className="hover:text-blue-600 dark:hover:text-blue-400 transition">About</a>
                                <a href="#projects" className="hover:text-blue-600 dark:hover:text-blue-400 transition">Work</a>
                                <a href="#contact" className="hover:text-blue-600 dark:hover:text-blue-400 transition">Contact</a>
                            </div>
                            <button 
                                onClick={() => setIsDark(!isDark)}
                                className="p-2 rounded-full bg-white dark:bg-slate-800 text-slate-800 dark:text-yellow-400 hover:scale-110 transition-transform shadow-md dark:shadow-inner flex items-center justify-center border border-slate-200 dark:border-transparent"
                                aria-label="Toggle Theme"
                            >
                                <i data-lucide={isDark ? "sun" : "moon"} className="w-5 h-5"></i>
                            </button>
                        </div>
                    </nav>

                    <main>
                        {/* Hero Section */}
                        <section id="about" className="pt-48 pb-32 px-6 max-w-5xl mx-auto flex flex-col items-center text-center opacity-0 animate-fade-in-up min-h-[85vh] justify-center relative z-10">
                            <div className="inline-flex items-center px-4 py-1.5 mb-8 rounded-full bg-white/80 dark:bg-blue-500/10 border border-blue-200 dark:border-blue-500/20 text-blue-700 dark:text-blue-400 text-xs font-bold uppercase tracking-widest glass-panel shadow-sm dark:shadow-none">
                                <span className="w-2 h-2 rounded-full bg-blue-500 mr-3 animate-pulse-slow shadow-[0_0_8px_rgba(59,130,246,0.8)]"></span>
                                Available for Opportunities
                            </div>
                            <h1 className="text-6xl md:text-8xl font-extrabold mb-6 tracking-tighter text-slate-900 dark:text-white drop-shadow-sm">
                                Akash V
                            </h1>
                            <h2 className="text-2xl md:text-4xl text-slate-600 dark:text-slate-400 mb-8 h-12">
                                <span className="text-blue-600 dark:text-blue-400 font-semibold border-r-2 border-blue-500 pr-2 animate-pulse">{typedText}</span>
                            </h2>
                            <p className="text-slate-600 dark:text-slate-400 max-w-xl mb-12 leading-relaxed text-lg">
                                Building scalable web solutions and intelligent systems. Currently pursuing a Bachelor of Engineering at Sapthagiri NPS University in Bengaluru.
                            </p>
                            <div className="flex flex-wrap justify-center gap-6">
                                <a href="#projects" className="px-8 py-4 cyber-gradient text-white rounded-xl font-bold hover:opacity-90 transition-all shadow-lg shadow-blue-500/25 hover:-translate-y-1">
                                    Explore My Work
                                </a>
                                <a href="#contact" className="px-8 py-4 bg-white dark:bg-transparent text-slate-900 dark:text-white rounded-xl font-bold border-2 border-slate-300 dark:border-slate-700 hover:bg-slate-50 dark:hover:bg-slate-800 transition-all shadow-sm dark:shadow-none">
                                    Get In Touch
                                </a>
                            </div>
                        </section>

                        {/* Projects Section */}
                        <section id="projects" className="py-24 px-6 max-w-6xl mx-auto opacity-0 animate-fade-in-up delay-100 relative z-10">
                            <h2 className="text-4xl font-extrabold mb-16 text-center text-slate-900 dark:text-white tracking-tight">Proof of Work</h2>
                            <div className="grid md:grid-cols-3 gap-8">
                                {[
                                    { title: "Maintenance App", desc: "A full-stack application featuring phone-number-based OTP login and real-time database synchronization.", icon: "smartphone", tags: ["Node.js", "MongoDB", "React"] },
                                    { title: "Psychic Shivaramji", desc: "A professional, fully deployed website delivered to meet specific client requirements.", icon: "globe", tags: ["Client Delivery", "Deployment"] },
                                    { title: "Task Management", desc: "A collaborative tool designed for efficiency, structured workflow management, and team synchronization.", icon: "kanban", tags: ["MERN", "State Mgmt"] }
                                ].map((project, i) => (
                                    <div key={i} className="p-8 glass-panel rounded-3xl border border-white/40 dark:border-slate-800 hover:-translate-y-2 hover:border-blue-400/50 dark:hover:border-blue-500/50 transition-all duration-300 group flex flex-col">
                                        <div className="w-14 h-14 rounded-2xl bg-blue-100 dark:bg-blue-500/10 flex items-center justify-center mb-6 group-hover:scale-110 transition-transform shadow-sm dark:shadow-none">
                                            <i data-lucide={project.icon} className="text-blue-600 dark:text-blue-400 w-7 h-7"></i>
                                        </div>
                                        <h3 className="text-2xl font-bold mb-3 text-slate-900 dark:text-white">{project.title}</h3>
                                        <p className="text-slate-600 dark:text-slate-400 text-sm mb-8 leading-relaxed flex-grow">
                                            {project.desc}
                                        </p>
                                        <div className="flex flex-wrap gap-2">
                                            {project.tags.map(tag => (
                                                <span key={tag} className="tech-tag px-3 py-1.5 bg-white/60 dark:bg-slate-900/80 rounded-lg text-blue-700 dark:text-blue-300 border border-blue-100 dark:border-slate-700/50 shadow-sm dark:shadow-none">{tag}</span>
                                            ))}
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </section>

                        {/* Interactive Contact Section */}
                        <section id="contact" className="py-24 px-6 border-t border-slate-200/50 dark:border-slate-800/50 opacity-0 animate-fade-in-up delay-200 relative z-10">
                            <div className="max-w-4xl mx-auto glass-panel p-8 md:p-12 rounded-3xl border border-white/40 dark:border-slate-800">
                                <div className="grid md:grid-cols-2 gap-12">
                                    <div>
                                        <h2 className="text-4xl font-extrabold mb-6 text-slate-900 dark:text-white tracking-tight">Let's build something.</h2>
                                        <p className="text-slate-600 dark:text-slate-400 mb-8 text-lg">
                                            Based in Kengeri, Bengaluru. I'm currently open for local and remote opportunities, collaborations, and client projects.
                                        </p>
                                        <div className="space-y-4">
                                            <div className="flex items-center text-slate-700 dark:text-slate-400">
                                                <i data-lucide="map-pin" className="mr-4 text-blue-600 dark:text-blue-500"></i> Kengeri, Bengaluru, KA
                                            </div>
                                            <div className="flex items-center text-slate-700 dark:text-slate-400">
                                                <i data-lucide="cpu" className="mr-4 text-blue-600 dark:text-blue-500"></i> Sapthagiri NPS / ROG Flow X16
                                            </div>
                                            <div className="flex items-center text-slate-700 dark:text-slate-400">
                                                <i data-lucide="languages" className="mr-4 text-blue-600 dark:text-blue-500"></i> English, Kannada, Tamil
                                            </div>
                                        </div>
                                    </div>

                                    <div>
                                        {formStatus === 'success' ? (
                                            <div className="h-full flex flex-col items-center justify-center text-center p-6 animate-fade-in-up">
                                                <div className="w-16 h-16 bg-green-100 dark:bg-green-500/20 rounded-full flex items-center justify-center mb-4 shadow-sm dark:shadow-none">
                                                    <i data-lucide="check" className="text-green-600 dark:text-green-400 w-8 h-8"></i>
                                                </div>
                                                <h3 className="text-2xl font-bold text-slate-900 dark:text-white mb-2">Message Sent!</h3>
                                                <p className="text-slate-600 dark:text-slate-400">I'll get back to you within 24 hours.</p>
                                                <button onClick={() => setFormStatus('idle')} className="mt-6 text-blue-600 dark:text-blue-500 font-semibold hover:underline">Send another</button>
                                            </div>
                                        ) : (
                                            <form onSubmit={handleFormSubmit} className="space-y-4">
                                                <div>
                                                    <label className="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1">Name</label>
                                                    <input required type="text" className="w-full px-4 py-3 rounded-xl bg-white/80 dark:bg-slate-900/50 border border-slate-200 dark:border-slate-700 focus:ring-2 focus:ring-blue-500 outline-none transition-all text-slate-900 dark:text-white shadow-sm" placeholder="John Doe" />
                                                </div>
                                                <div>
                                                    <label className="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1">Email</label>
                                                    <input required type="email" className="w-full px-4 py-3 rounded-xl bg-white/80 dark:bg-slate-900/50 border border-slate-200 dark:border-slate-700 focus:ring-2 focus:ring-blue-500 outline-none transition-all text-slate-900 dark:text-white shadow-sm" placeholder="john@example.com" />
                                                </div>
                                                <div>
                                                    <label className="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1">Message</label>
                                                    <textarea required rows="4" className="w-full px-4 py-3 rounded-xl bg-white/80 dark:bg-slate-900/50 border border-slate-200 dark:border-slate-700 focus:ring-2 focus:ring-blue-500 outline-none transition-all text-slate-900 dark:text-white resize-none shadow-sm" placeholder="Tell me about your project..."></textarea>
                                                </div>
                                                <button type="submit" disabled={formStatus === 'submitting'} className="w-full py-4 cyber-gradient text-white font-bold rounded-xl hover:opacity-90 transition-opacity flex justify-center items-center shadow-lg shadow-blue-500/20">
                                                    {formStatus === 'submitting' ? <i data-lucide="loader-2" className="animate-spin w-5 h-5"></i> : "Send Message"}
                                                </button>
                                            </form>
                                        )}
                                    </div>
                                </div>
                            </div>
                        </section>
                    </main>

                    {/* Footer Links */}
                    <footer className="py-8 text-center text-slate-500 dark:text-slate-500 text-sm relative z-10">
                        <div className="flex justify-center space-x-6 mb-4">
                            <a href="#" className="hover:text-blue-600 dark:hover:text-blue-500 transition-colors"><i data-lucide="github"></i></a>
                            <a href="#" className="hover:text-blue-600 dark:hover:text-blue-500 transition-colors"><i data-lucide="linkedin"></i></a>
                            <a href="#" className="hover:text-blue-600 dark:hover:text-blue-500 transition-colors"><i data-lucide="twitter"></i></a>
                        </div>
                        <p>&copy; 2024 Akash V. All rights reserved.</p>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
