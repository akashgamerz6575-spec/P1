<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CivicSync | AI-Powered Urban Maintenance</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap');
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #0f172a; /* Slate 900 */
            color: #f8fafc;
        }
        
        /* Modern UI Background */
        .bg-mesh {
            background-color: #0f172a;
            background-image: 
                radial-gradient(at 0% 0%, hsla(253,16%,7%,1) 0, transparent 50%), 
                radial-gradient(at 50% 0%, hsla(225,39%,30%,0.4) 0, transparent 50%), 
                radial-gradient(at 100% 0%, hsla(339,49%,30%,0.3) 0, transparent 50%);
            background-attachment: fixed;
        }

        /* Glassmorphism Panels */
        .glass-panel { 
            background: rgba(30, 41, 59, 0.7); 
            backdrop-filter: blur(16px); 
            -webkit-backdrop-filter: blur(16px); 
            border: 1px solid rgba(255, 255, 255, 0.1); 
        }

        .glass-card {
            background: linear-gradient(145deg, rgba(30, 41, 59, 0.9) 0%, rgba(15, 23, 42, 0.9) 100%);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
        }

        /* Text Gradients */
        .text-gradient {
            background: linear-gradient(to right, #60a5fa, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Animations */
        .animate-fade-in { animation: fadeIn 0.5s ease-out forwards; }
        .animate-slide-up { animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        
        .pulse-dot { animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .4; } }
        
        /* Custom Scrollbar for hidden overflow */
        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="bg-mesh">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const Icon = ({ name, size = 24, className = "" }) => {
            useEffect(() => { lucide.createIcons(); }, [name]);
            return <i data-lucide={name} width={size} height={size} className={className}></i>;
        };

        const App = () => {
            // View States: 'splash', 'login', 'otp', 'dashboard', 'report'
            const [view, setView] = useState('splash');
            const [phone, setPhone] = useState('');
            const [viewMode, setViewMode] = useState('list');
            const [isAnalyzing, setIsAnalyzing] = useState(false);
            const [aiResult, setAiResult] = useState(null);
            
            const fileInputRef = useRef(null);

            // App Initialization (Splash Screen)
            useEffect(() => {
                if (view === 'splash') {
                    const timer = setTimeout(() => setView('login'), 2200);
                    return () => clearTimeout(timer);
                }
            }, [view]);

            // Mock Data tailored to Bengaluru
            const [reports, setReports] = useState([
                { id: 'SYNC-849', type: 'Severe Pothole', location: 'Kengeri Main Road', status: 'In Progress', severity: 'High', dept: 'Road Infra', time: '2 hrs ago' },
                { id: 'SYNC-842', type: 'Streetlight Outage', location: 'Mysore Road', status: 'Resolved', severity: 'Low', dept: 'Electrical', time: '1 day ago' }
            ]);

            // Handlers
            const requestOTP = (e) => {
                e.preventDefault();
                if(phone.length >= 10) setView('otp');
            };

            const verifyOTP = (e) => {
                e.preventDefault();
                setView('dashboard');
            };

            const simulateAIAnalysis = () => {
                setIsAnalyzing(true);
                setAiResult(null);
                
                setTimeout(() => {
                    setIsAnalyzing(false);
                    setAiResult({
                        type: 'Burst Water Pipe',
                        confidence: '98.4%',
                        severity: 'Critical',
                        dept: 'BWSSB',
                        action: 'Emergency Dispatch Required'
                    });
                }, 2500);
            };

            const submitReport = () => {
                const newReport = {
                    id: `SYNC-${Math.floor(Math.random() * 900) + 100}`,
                    type: aiResult.type,
                    location: 'Current GPS Location',
                    status: 'Dispatched',
                    severity: aiResult.severity,
                    dept: aiResult.dept,
                    time: 'Just now'
                };
                setReports([newReport, ...reports]);
                setView('dashboard');
                setAiResult(null);
            };

            return (
                <div className="min-h-screen flex justify-center text-slate-100">
                    <div className="w-full max-w-md relative overflow-hidden flex flex-col min-h-screen border-x border-slate-800 shadow-2xl">
                        
                        {/* --- SPLASH SCREEN --- */}
                        {view === 'splash' && (
                            <div className="flex-1 flex flex-col items-center justify-center animate-fade-in bg-[#0f172a] z-50 absolute inset-0">
                                <div className="w-24 h-24 bg-gradient-to-tr from-blue-600 to-indigo-500 rounded-3xl flex items-center justify-center mb-6 shadow-lg shadow-blue-500/30 transform scale-100 animate-[pulse_2s_ease-in-out_infinite]">
                                    <Icon name="satellite" className="text-white" size={48} />
                                </div>
                                <h1 className="text-4xl font-extrabold tracking-tight mb-2 text-white">CivicSync</h1>
                                <p className="text-blue-400 font-medium tracking-widest uppercase text-xs">Bengaluru City Platform</p>
                            </div>
                        )}

                        {/* --- HEADER (Hidden on Login/Splash) --- */}
                        {view !== 'splash' && view !== 'login' && view !== 'otp' && (
                            <header className="glass-panel px-5 py-4 flex justify-between items-center sticky top-0 z-30">
                                <div className="flex items-center gap-3">
                                    <div className="bg-gradient-to-tr from-blue-600 to-indigo-500 p-2 rounded-xl shadow-md">
                                        <Icon name="satellite" className="text-white" size={18} />
                                    </div>
                                    <div>
                                        <h1 className="text-lg font-bold text-white leading-tight">CivicSync</h1>
                                        <div className="flex items-center gap-1 text-[10px] text-emerald-400 font-semibold uppercase tracking-wider">
                                            <span className="w-1.5 h-1.5 rounded-full bg-emerald-500 pulse-dot"></span> Live Sync Active
                                        </div>
                                    </div>
                                </div>
                                <button onClick={() => setView('login')} className="bg-slate-800 p-2 rounded-full text-slate-400 hover:text-white transition-colors border border-slate-700">
                                    <Icon name="log-out" size={18} />
                                </button>
                            </header>
                        )}

                        <main className="p-6 pb-28 flex-1 flex flex-col">
                            {/* --- LOGIN VIEW --- */}
                            {view === 'login' && (
                                <div className="flex-1 flex flex-col justify-center animate-slide-up pb-10">
                                    <div className="w-16 h-16 bg-gradient-to-tr from-blue-600 to-indigo-500 rounded-2xl flex items-center justify-center mb-8 shadow-lg shadow-blue-500/20">
                                        <Icon name="zap" className="text-white" size={32} />
                                    </div>
                                    <h2 className="text-4xl font-extrabold text-white mb-3 tracking-tight">Smart Civic<br/><span className="text-gradient">Maintenance.</span></h2>
                                    <p className="text-slate-400 mb-10 text-lg leading-relaxed">Report infrastructure issues instantly. Powered by Gemini AI for rapid municipal routing.</p>
                                    
                                    <form onSubmit={requestOTP} className="space-y-5">
                                        <div>
                                            <div className="relative group">
                                                <span className="absolute left-4 top-4 text-slate-400 font-medium">+91</span>
                                                <input type="tel" value={phone} onChange={e => setPhone(e.target.value)} className="w-full pl-12 pr-4 py-4 bg-slate-800/50 border border-slate-700 rounded-2xl focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition-all font-medium text-white placeholder-slate-500" placeholder="Enter mobile number" required />
                                            </div>
                                        </div>
                                        <button className="w-full bg-gradient-to-r from-blue-600 to-indigo-600 text-white py-4 rounded-2xl font-bold hover:shadow-lg hover:shadow-blue-500/25 transition-all flex justify-center items-center gap-2">
                                            Continue Securely <Icon name="arrow-right" size={20} />
                                        </button>
                                    </form>
                                </div>
                            )}

                            {/* --- OTP VIEW --- */}
                            {view === 'otp' && (
                                <div className="flex-1 flex flex-col justify-center animate-slide-up pb-10">
                                    <button onClick={() => setView('login')} className="w-10 h-10 bg-slate-800 rounded-full flex items-center justify-center text-slate-400 mb-8 border border-slate-700 hover:text-white transition-colors">
                                        <Icon name="chevron-left" size={20} />
                                    </button>
                                    <h2 className="text-3xl font-bold text-white mb-2 tracking-tight">Verify Number</h2>
                                    <p className="text-slate-400 mb-10">We've sent a 4-digit security code to <span className="text-white font-medium">+91 {phone}</span></p>
                                    
                                    <form onSubmit={verifyOTP} className="space-y-8">
                                        <div className="flex gap-4 justify-between">
                                            {[0, 1, 2, 3].map(index => (
                                                <input 
                                                    key={index} 
                                                    id={`otp-${index}`}
                                                    type="text" 
                                                    inputMode="numeric"
                                                    maxLength="1" 
                                                    className="w-16 h-16 text-center text-2xl font-bold bg-slate-800/50 border border-slate-700 rounded-2xl focus:ring-2 focus:ring-blue-500 outline-none transition-all text-white placeholder-slate-600 shadow-inner" 
                                                    required 
                                                    onChange={(e) => {
                                                        const val = e.target.value;
                                                        if (val && !/^[0-9]$/.test(val)) { e.target.value = ''; return; }
                                                        if (val && index < 3) document.getElementById(`otp-${index + 1}`).focus();
                                                    }}
                                                    onKeyDown={(e) => {
                                                        if (e.key === 'Backspace' && !e.target.value && index > 0) {
                                                            document.getElementById(`otp-${index - 1}`).focus();
                                                        }
                                                    }}
                                                />
                                            ))}
                                        </div>
                                        <button className="w-full bg-gradient-to-r from-blue-600 to-indigo-600 text-white py-4 rounded-2xl font-bold shadow-lg shadow-blue-500/25 transition-all">
                                            Verify & Authenticate
                                        </button>
                                    </form>
                                </div>
                            )}

                            {/* --- DASHBOARD VIEW --- */}
                            {view === 'dashboard' && (
                                <div className="space-y-6 animate-fade-in">
                                    {/* View Toggle */}
                                    <div className="flex bg-slate-800/80 p-1.5 rounded-xl border border-slate-700">
                                        <button onClick={() => setViewMode('list')} className={`flex-1 py-2 text-sm font-semibold rounded-lg transition-all ${viewMode === 'list' ? 'bg-slate-700 text-white shadow-md' : 'text-slate-400'}`}>Active Reports</button>
                                        <button onClick={() => setViewMode('map')} className={`flex-1 py-2 text-sm font-semibold rounded-lg transition-all ${viewMode === 'map' ? 'bg-slate-700 text-white shadow-md' : 'text-slate-400'}`}>Live Map</button>
                                    </div>

                                    {viewMode === 'map' ? (
                                        <div className="w-full h-96 bg-slate-800 rounded-3xl border border-slate-700 overflow-hidden relative flex items-center justify-center">
                                            {/* Simulated Map Background */}
                                            <div className="absolute inset-0 opacity-20 bg-[url('https://www.transparenttextures.com/patterns/cubes.png')]"></div>
                                            <div className="absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 text-blue-500 animate-bounce">
                                                <Icon name="map-pin" size={48} className="drop-shadow-lg" />
                                            </div>
                                            <div className="absolute bottom-6 glass-panel px-5 py-2.5 rounded-full text-sm font-medium text-white shadow-xl flex items-center gap-2">
                                                <span className="w-2 h-2 rounded-full bg-emerald-400 pulse-dot"></span> Radar Active
                                            </div>
                                        </div>
                                    ) : (
                                        <div className="space-y-4">
                                            {reports.map(r => (
                                                <div key={r.id} className="glass-card p-5 rounded-3xl">
                                                    <div className="flex justify-between items-center mb-4">
                                                        <span className={`text-[10px] font-bold uppercase px-3 py-1.5 rounded-lg tracking-wider ${r.severity === 'Critical' ? 'bg-red-500/20 text-red-400 border border-red-500/30' : r.severity === 'High' ? 'bg-orange-500/20 text-orange-400 border border-orange-500/30' : 'bg-emerald-500/20 text-emerald-400 border border-emerald-500/30'}`}>
                                                            {r.severity}
                                                        </span>
                                                        <span className="text-slate-400 text-xs font-medium flex items-center gap-1"><Icon name="clock" size={12}/> {r.time}</span>
                                                    </div>
                                                    <h3 className="font-bold text-white text-xl mb-1">{r.type}</h3>
                                                    <div className="flex items-center gap-2 text-slate-400 text-sm mb-5">
                                                        <Icon name="map-pin" size={16} className="text-blue-400" /> {r.location}
                                                    </div>
                                                    
                                                    <div className="flex items-center justify-between pt-4 border-t border-slate-700/50">
                                                        <div className="flex items-center gap-2">
                                                            <span className={`w-2 h-2 rounded-full shadow-lg ${r.status === 'Resolved' ? 'bg-emerald-400 shadow-emerald-500/50' : r.status === 'Dispatched' ? 'bg-blue-400 shadow-blue-500/50' : 'bg-amber-400 shadow-amber-500/50'}`}></span>
                                                            <span className="text-sm font-semibold text-slate-300">{r.status}</span>
                                                        </div>
                                                        <span className="text-xs text-slate-500 font-mono bg-slate-800 px-2 py-1 rounded">{r.id}</span>
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    )}
                                </div>
                            )}

                            {/* --- REPORT ISSUE VIEW --- */}
                            {view === 'report' && (
                                <div className="space-y-6 animate-slide-up">
                                    <div className="flex items-center justify-between">
                                        <h2 className="text-2xl font-bold text-white tracking-tight">AI Assessment</h2>
                                        <button onClick={() => {setView('dashboard'); setAiResult(null);}} className="bg-slate-800 p-2 rounded-full text-slate-400 hover:text-white transition-colors border border-slate-700">
                                            <Icon name="x" size={20} />
                                        </button>
                                    </div>

                                    {!aiResult ? (
                                        <div>
                                            <input 
                                                type="file" 
                                                accept="image/*" 
                                                capture="environment"
                                                ref={fileInputRef} 
                                                className="hidden" 
                                                onChange={(e) => {
                                                    if(e.target.files && e.target.files.length > 0) {
                                                        simulateAIAnalysis();
                                                    }
                                                }}
                                            />
                                            
                                            <div 
                                                className={`glass-panel border-2 border-dashed rounded-3xl p-8 text-center transition-all ${isAnalyzing ? 'border-blue-500 bg-blue-900/20' : 'border-slate-600 hover:border-slate-400 hover:bg-slate-800/50 cursor-pointer'}`} 
                                                onClick={() => {
                                                    if (!isAnalyzing && fileInputRef.current) {
                                                        fileInputRef.current.click();
                                                    }
                                                }}
                                            >
                                                {isAnalyzing ? (
                                                    <div className="flex flex-col items-center py-8">
                                                        <Icon name="sparkles" size={40} className="text-blue-400 mb-4 animate-pulse" />
                                                        <h3 className="font-bold text-white text-lg mb-2">Gemini AI Processing...</h3>
                                                        <p className="text-sm text-blue-300">Extracting visual data & severity metrics</p>
                                                    </div>
                                                ) : (
                                                    <div className="py-10">
                                                        <div className="w-20 h-20 bg-slate-800 rounded-full flex items-center justify-center mx-auto mb-6 shadow-inner border border-slate-700">
                                                            <Icon name="camera" className="text-blue-400" size={36} />
                                                        </div>
                                                        <h3 className="font-bold text-white text-xl mb-2">Upload Infrastructure Issue</h3>
                                                        <p className="text-sm text-slate-400">Tap to capture the scene. AI will route it.</p>
                                                    </div>
                                                )}
                                            </div>
                                        </div>
                                    ) : (
                                        <div className="glass-card rounded-3xl overflow-hidden animate-fade-in">
                                            <div className="bg-gradient-to-r from-blue-600 to-indigo-600 p-5 flex items-center gap-3 text-white border-b border-white/10">
                                                <Icon name="cpu" size={24} className="text-blue-200" />
                                                <div>
                                                    <h3 className="font-bold text-lg">Triage Complete</h3>
                                                    <p className="text-blue-200 text-xs font-mono">Gemini Vision Model v1.5</p>
                                                </div>
                                            </div>
                                            <div className="p-6 space-y-6">
                                                <div className="grid grid-cols-2 gap-5">
                                                    <div>
                                                        <p className="text-[10px] text-slate-400 font-bold uppercase tracking-wider mb-1">Detected Issue</p>
                                                        <p className="font-bold text-white text-lg">{aiResult.type}</p>
                                                    </div>
                                                    <div>
                                                        <p className="text-[10px] text-slate-400 font-bold uppercase tracking-wider mb-1">Severity / Confidence</p>
                                                        <div className="flex items-center gap-2">
                                                            <span className="bg-red-500/20 text-red-400 border border-red-500/30 text-xs font-bold px-2 py-1 rounded uppercase">{aiResult.severity}</span>
                                                            <span className="text-slate-300 text-sm font-mono">{aiResult.confidence}</span>
                                                        </div>
                                                    </div>
                                                    <div className="col-span-2 bg-slate-800/50 p-4 rounded-2xl border border-slate-700">
                                                        <p className="text-[10px] text-slate-400 font-bold uppercase tracking-wider mb-2">Routing Department</p>
                                                        <p className="font-bold text-white flex items-center gap-3">
                                                            <span className="p-2 bg-slate-700 rounded-lg text-blue-400"><Icon name="truck" size={18}/></span> {aiResult.dept}
                                                        </p>
                                                    </div>
                                                </div>
                                                <button onClick={submitReport} className="w-full bg-white text-slate-900 py-4 rounded-2xl font-extrabold shadow-lg hover:bg-slate-200 transition-all flex items-center justify-center gap-2">
                                                    Confirm & Dispatch <Icon name="send" size={18} />
                                                </button>
                                            </div>
                                        </div>
                                    )}
                                </div>
                            )}
                        </main>

                        {/* Floating Action Button for Dashboard */}
                        {view === 'dashboard' && (
                            <div className="absolute bottom-8 left-0 right-0 px-6 z-20 flex justify-end">
                                <button onClick={() => setView('report')} className="bg-gradient-to-tr from-blue-600 to-indigo-500 hover:from-blue-500 hover:to-indigo-400 text-white w-16 h-16 rounded-full shadow-lg shadow-blue-500/40 flex items-center justify-center transform hover:scale-105 transition-all border border-blue-400/30">
                                    <Icon name="plus" size={32} />
                                </button>
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
