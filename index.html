<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CivicSync | AI-Powered Urban Maintenance</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .glass-panel { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.3); }
        .pulse-dot { animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .5; } }
        .loader { border-top-color: #3b82f6; animation: spinner 1.5s linear infinite; }
        @keyframes spinner { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // Custom Icon Component using Lucide
        const Icon = ({ name, size = 24, className = "" }) => {
            useEffect(() => { lucide.createIcons(); }, [name]);
            return <i data-lucide={name} width={size} height={size} className={className}></i>;
        };

        const App = () => {
            const [view, setView] = useState('login');
            const [phone, setPhone] = useState('');
            const [viewMode, setViewMode] = useState('list');
            const [isAnalyzing, setIsAnalyzing] = useState(false);
            const [aiResult, setAiResult] = useState(null);
            
            const fileInputRef = useRef(null); // Reference for the hidden file input

            // Mock Data
            const [reports, setReports] = useState([
                { id: 'SYNC-849', type: 'Severe Pothole', location: 'Kengeri Main Road', status: 'In Progress', severity: 'High', dept: 'Road Infra', time: '2 hrs ago' },
                { id: 'SYNC-842', type: 'Streetlight Outage', location: 'Near Sapthagiri University', status: 'Resolved', severity: 'Low', dept: 'Electrical', time: '1 day ago' }
            ]);

            // Handlers
            const requestOTP = (e) => {
                e.preventDefault();
                if(phone.length >= 10) setView('otp');
            };

            const verifyOTP = (e) => {
                e.preventDefault();
                setView('dashboard');
            };

            const simulateAIAnalysis = () => {
                setIsAnalyzing(true);
                setAiResult(null);
                
                // Simulate network request to Gemini API
                setTimeout(() => {
                    setIsAnalyzing(false);
                    setAiResult({
                        type: 'Burst Water Pipe',
                        confidence: '98.4%',
                        severity: 'Critical',
                        dept: 'BWSSB / Water Supply',
                        action: 'Emergency Dispatch Required'
                    });
                }, 2500);
            };

            const submitReport = () => {
                const newReport = {
                    id: `SYNC-${Math.floor(Math.random() * 900) + 100}`,
                    type: aiResult.type,
                    location: 'Current GPS Location',
                    status: 'Dispatched',
                    severity: aiResult.severity,
                    dept: aiResult.dept,
                    time: 'Just now'
                };
                setReports([newReport, ...reports]);
                setView('dashboard');
                setAiResult(null);
            };

            return (
                <div className="min-h-screen flex justify-center bg-slate-100">
                    <div className="w-full max-w-md bg-slate-50 min-h-screen relative shadow-2xl overflow-hidden">
                        
                        {/* Header */}
                        {view !== 'login' && view !== 'otp' && (
                            <header className="bg-white px-5 py-4 flex justify-between items-center sticky top-0 z-10 border-b border-slate-200 shadow-sm">
                                <div className="flex items-center gap-2">
                                    <div className="bg-blue-600 p-1.5 rounded-lg">
                                        <Icon name="satellite" className="text-white" size={18} />
                                    </div>
                                    <div>
                                        <h1 className="text-lg font-bold text-slate-900 leading-tight">CivicSync</h1>
                                        <div className="flex items-center gap-1 text-[10px] text-emerald-600 font-semibold uppercase tracking-wider">
                                            <span className="w-1.5 h-1.5 rounded-full bg-emerald-500 pulse-dot"></span> Live Sync Active
                                        </div>
                                    </div>
                                </div>
                                <button onClick={() => setView('login')} className="text-slate-400 hover:text-slate-600">
                                    <Icon name="log-out" size={20} />
                                </button>
                            </header>
                        )}

                        <main className="p-5 pb-24">
                            {/* --- LOGIN VIEW --- */}
                            {view === 'login' && (
                                <div className="mt-20 px-4">
                                    <div className="w-16 h-16 bg-blue-600 rounded-2xl flex items-center justify-center mb-6 shadow-lg shadow-blue-200">
                                        <Icon name="leaf" className="text-white" size={32} />
                                    </div>
                                    <h2 className="text-3xl font-extrabold text-slate-900 mb-2">Smart Civic<br/>Maintenance.</h2>
                                    <p className="text-slate-500 mb-8 leading-relaxed">Report infrastructure issues instantly. Powered by Gemini AI for rapid routing.</p>
                                    
                                    <form onSubmit={requestOTP} className="space-y-4">
                                        <div>
                                            <label className="text-sm font-semibold text-slate-700 block mb-1">Phone Number</label>
                                            <div className="relative">
                                                <span className="absolute left-4 top-3.5 text-slate-400 font-medium">+91</span>
                                                <input type="tel" value={phone} onChange={e => setPhone(e.target.value)} className="w-full pl-12 pr-4 py-3.5 bg-white border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-600 focus:border-transparent outline-none transition-all font-medium" placeholder="Enter mobile number" required />
                                            </div>
                                        </div>
                                        <button className="w-full bg-slate-900 text-white py-3.5 rounded-xl font-semibold hover:bg-slate-800 transition-colors flex justify-center items-center gap-2">
                                            Send Secure OTP <Icon name="arrow-right" size={18} />
                                        </button>
                                    </form>
                                </div>
                            )}

                            {/* --- OTP VIEW --- */}
                            {view === 'otp' && (
                                <div className="mt-20 px-4">
                                    <button onClick={() => setView('login')} className="text-slate-400 mb-6 flex items-center gap-1 hover:text-slate-900 transition-colors">
                                        <Icon name="arrow-left" size={16} /> Back
                                    </button>
                                    <h2 className="text-2xl font-bold text-slate-900 mb-2">Verify Number</h2>
                                    <p className="text-slate-500 mb-8 text-sm">We've sent a 4-digit code to +91 {phone}</p>
                                    
                                    <form onSubmit={verifyOTP} className="space-y-6">
                                        {/* OTP Input Group with Auto-advance */}
                                        <div className="flex gap-3 justify-between">
                                            {[0, 1, 2, 3].map(index => (
                                                <input 
                                                    key={index} 
                                                    id={`otp-${index}`}
                                                    type="text" 
                                                    inputMode="numeric"
                                                    maxLength="1" 
                                                    className="w-14 h-14 text-center text-xl font-bold bg-white border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-600 outline-none transition-all" 
                                                    required 
                                                    onChange={(e) => {
                                                        const val = e.target.value;
                                                        // Ensure only numbers are entered
                                                        if (val && !/^[0-9]$/.test(val)) {
                                                            e.target.value = '';
                                                            return;
                                                        }
                                                        // Auto-advance to next input
                                                        if (val && index < 3) {
                                                            document.getElementById(`otp-${index + 1}`).focus();
                                                        }
                                                    }}
                                                    onKeyDown={(e) => {
                                                        // Move back on backspace if current field is empty
                                                        if (e.key === 'Backspace' && !e.target.value && index > 0) {
                                                            document.getElementById(`otp-${index - 1}`).focus();
                                                        }
                                                    }}
                                                />
                                            ))}
                                        </div>
                                        <button className="w-full bg-blue-600 text-white py-3.5 rounded-xl font-semibold hover:bg-blue-700 shadow-lg shadow-blue-200 transition-all">
                                            Verify & Login
                                        </button>
                                    </form>
                                </div>
                            )}

                            {/* --- DASHBOARD VIEW --- */}
                            {view === 'dashboard' && (
                                <div className="space-y-6 animate-fade-in">
                                    <div className="flex bg-slate-200 p-1 rounded-lg">
                                        <button onClick={() => setViewMode('list')} className={`flex-1 py-1.5 text-sm font-semibold rounded-md transition-all ${viewMode === 'list' ? 'bg-white shadow text-slate-900' : 'text-slate-500'}`}>List View</button>
                                        <button onClick={() => setViewMode('map')} className={`flex-1 py-1.5 text-sm font-semibold rounded-md transition-all ${viewMode === 'map' ? 'bg-white shadow text-slate-900' : 'text-slate-500'}`}>Live Map</button>
                                    </div>

                                    {viewMode === 'map' ? (
                                        <div className="w-full h-96 bg-slate-200 rounded-2xl border-2 border-slate-300 overflow-hidden relative flex items-center justify-center bg-[url('https://www.transparenttextures.com/patterns/cubes.png')]">
                                            <div className="absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 text-blue-600">
                                                <Icon name="map-pin" size={40} className="drop-shadow-lg" />
                                            </div>
                                            <span className="bg-white/90 backdrop-blur px-4 py-2 rounded-full text-sm font-semibold text-slate-700 shadow-md absolute bottom-4">Map Integration Placeholder</span>
                                        </div>
                                    ) : (
                                        <div className="space-y-4">
                                            {reports.map(r => (
                                                <div key={r.id} className="bg-white p-4 rounded-2xl shadow-sm border border-slate-100 hover:shadow-md transition-shadow">
                                                    <div className="flex justify-between items-start mb-3">
                                                        <span className={`text-[11px] font-bold uppercase px-2.5 py-1 rounded-md tracking-wide ${r.severity === 'Critical' ? 'bg-red-100 text-red-700' : r.severity === 'High' ? 'bg-orange-100 text-orange-700' : 'bg-emerald-100 text-emerald-700'}`}>
                                                            {r.severity}
                                                        </span>
                                                        <span className="text-slate-400 text-xs font-medium">{r.time}</span>
                                                    </div>
                                                    <h3 className="font-bold text-slate-900 text-lg">{r.type}</h3>
                                                    <div className="flex items-center gap-1.5 text-slate-500 text-sm mt-1 mb-4">
                                                        <Icon name="map-pin" size={14} /> {r.location}
                                                    </div>
                                                    
                                                    <div className="flex items-center justify-between pt-3 border-t border-slate-100">
                                                        <div className="flex items-center gap-2">
                                                            <span className={`w-2 h-2 rounded-full ${r.status === 'Resolved' ? 'bg-emerald-500' : r.status === 'Dispatched' ? 'bg-blue-500' : 'bg-amber-500'}`}></span>
                                                            <span className="text-sm font-semibold text-slate-700">{r.status}</span>
                                                        </div>
                                                        <span className="text-xs text-slate-400 font-mono">{r.id}</span>
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    )}
                                </div>
                            )}

                            {/* --- REPORT ISSUE VIEW --- */}
                            {view === 'report' && (
                                <div className="space-y-6">
                                    <div className="flex items-center justify-between">
                                        <h2 className="text-xl font-bold text-slate-900">New Report</h2>
                                        <button onClick={() => {setView('dashboard'); setAiResult(null);}} className="text-slate-400 hover:text-slate-700"><Icon name="x" size={24} /></button>
                                    </div>

                                    {!aiResult ? (
                                        <div>
                                            {/* Hidden file input that gets triggered by clicking the box below */}
                                            <input 
                                                type="file" 
                                                accept="image/*" 
                                                capture="environment"
                                                ref={fileInputRef} 
                                                className="hidden" 
                                                onChange={(e) => {
                                                    // Trigger analysis only if a file was actually selected
                                                    if(e.target.files && e.target.files.length > 0) {
                                                        simulateAIAnalysis();
                                                    }
                                                }}
                                            />
                                            
                                            <div 
                                                className={`border-2 border-dashed rounded-3xl p-8 text-center transition-all ${isAnalyzing ? 'border-blue-400 bg-blue-50' : 'border-slate-300 bg-white hover:bg-slate-50 cursor-pointer'}`} 
                                                onClick={() => {
                                                    if (!isAnalyzing && fileInputRef.current) {
                                                        fileInputRef.current.click();
                                                    }
                                                }}
                                            >
                                                {isAnalyzing ? (
                                                    <div className="flex flex-col items-center py-6">
                                                        <div className="w-12 h-12 border-4 loader rounded-full border-slate-200 mb-4"></div>
                                                        <h3 className="font-bold text-blue-600 mb-1">Gemini AI is analyzing...</h3>
                                                        <p className="text-xs text-blue-400">Extracting context from image and metadata</p>
                                                    </div>
                                                ) : (
                                                    <div className="py-8">
                                                        <div className="w-16 h-16 bg-slate-100 rounded-full flex items-center justify-center mx-auto mb-4">
                                                            <Icon name="camera" className="text-slate-500" size={28} />
                                                        </div>
                                                        <h3 className="font-bold text-slate-700 mb-1">Upload Photo</h3>
                                                        <p className="text-sm text-slate-500">Tap to capture the civic issue</p>
                                                    </div>
                                                )}
                                            </div>
                                        </div>
                                    ) : (
                                        <div className="bg-white rounded-2xl border border-slate-200 overflow-hidden shadow-sm animate-fade-in">
                                            <div className="bg-slate-900 p-4 flex items-center gap-3 text-white">
                                                <Icon name="sparkles" size={20} className="text-blue-400" />
                                                <h3 className="font-semibold">AI Triage Complete</h3>
                                            </div>
                                            <div className="p-5 space-y-4">
                                                <div className="grid grid-cols-2 gap-4">
                                                    <div>
                                                        <p className="text-xs text-slate-500 font-semibold uppercase mb-1">Detected Issue</p>
                                                        <p className="font-bold text-slate-900">{aiResult.type}</p>
                                                    </div>
                                                    <div>
                                                        <p className="text-xs text-slate-500 font-semibold uppercase mb-1">Severity</p>
                                                        <span className="bg-red-100 text-red-700 text-xs font-bold px-2 py-1 rounded">{aiResult.severity}</span>
                                                    </div>
                                                    <div className="col-span-2">
                                                        <p className="text-xs text-slate-500 font-semibold uppercase mb-1">Routing Department</p>
                                                        <p className="font-medium text-slate-700 flex items-center gap-2">
                                                            <Icon name="truck" size={16} className="text-slate-400"/> {aiResult.dept}
                                                        </p>
                                                    </div>
                                                </div>
                                                <button onClick={submitReport} className="w-full mt-4 bg-blue-600 text-white py-3 rounded-xl font-semibold shadow-md hover:bg-blue-700">
                                                    Confirm & Dispatch
                                                </button>
                                            </div>
                                        </div>
                                    )}
                                </div>
                            )}
                        </main>

                        {/* Floating Action Button for Dashboard */}
                        {view === 'dashboard' && (
                            <div className="fixed bottom-6 left-0 right-0 max-w-md mx-auto px-5 z-20 flex justify-end">
                                <button onClick={() => setView('report')} className="bg-blue-600 hover:bg-blue-700 text-white w-14 h-14 rounded-full shadow-lg shadow-blue-300 flex items-center justify-center transform hover:scale-105 transition-all">
                                    <Icon name="plus" size={28} />
                                </button>
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
